<!DOCTYPE html>

  <meta property="og:title" content="404 — Page not found · AI News Hub">
  <meta property="og:description" content="The requested AI News Hub page could not be found. Return to the primary-source AI news feed.">
  <meta property="og:url" content="https://ai-news.helloworldfirm.com/404.html">
  <meta property="og:type" content="website">

  <meta name="twitter:card" content="summary">

  <link rel="icon" href="/favicon.ico" sizes="any" />
  <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png" />
  <link rel="stylesheet" href="/global-font.css" />
  <style>
    body {
      background:
        linear-gradient(rgba(255,255,255,0.022) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.022) 1px, transparent 1px),
        #0a0a0a;
      background-size: 48px 48px, 48px 48px, auto;
      color: #eaeaea;
      font-family: 'NebulaSans-Book', 'Arial Narrow', Arial, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      margin: 0;
      padding: 1.5rem;
      box-sizing: border-box;
    }
    .panel {
      width: min(100%, 460px);
      border: 1px solid rgba(234,234,234,0.2);
      background: rgba(10,10,10,0.72);
      padding: 2.75rem 2rem;
    }
    .eyebrow {
      font-family: 'IBM Plex Mono', ui-monospace, SFMono-Regular, Menlo, monospace;
      font-size: 0.72rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: #e61919;
      margin: 0 0 1.25rem;
    }
    h1 {
      font-family: 'NebulaSans-BoldItalic', 'NebulaSans-Book', sans-serif;
      font-style: italic;
      font-size: clamp(2.4rem, 8vw, 3.4rem);
      line-height: 0.95;
      text-transform: uppercase;
      margin: 0 0 1rem;
    }
    p {
      color: #a8a8a8;
      font-size: 1.05rem;
      line-height: 1.6;
      margin: 0 0 1.5rem;
    }
    .path {
      font-family: 'IBM Plex Mono', ui-monospace, SFMono-Regular, Menlo, monospace;
      font-size: 0.85rem;
      color: #a8a8a8;
      border: 1px solid rgba(234,234,234,0.2);
      padding: 0.55rem 0.85rem;
      word-break: break-all;
    }
    .path span { color: #eaeaea; }
    .home-btn {
      display: inline-flex;
      align-items: center;
      min-height: 44px;
      margin-top: 1.75rem;
      padding: 0.8rem 1.1rem;
      border: 1px solid #e61919;
      background: #e61919;
      color: #fff;
      font-family: 'IBM Plex Mono', ui-monospace, SFMono-Regular, Menlo, monospace;
      font-weight: 800;
      font-size: 0.78rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      text-decoration: none;
      transition: transform 180ms ease, background-color 180ms ease, border-color 180ms ease;
    }
    .home-btn:hover, .home-btn:focus-visible {
      background: #ff2a2a;
      border-color: #ff2a2a;
      transform: translateY(-2px);
      outline: none;
    }
    @media (prefers-reduced-motion: reduce) {
      .home-btn { transition: none; }
    }
  </style>
</head>
<body>
  <div class="panel">
    <p class="eyebrow">[ 404 ]</p>
    <h1>Page not found</h1>
    <p>That page isn't here. It may have moved, or the link was mistyped.</p>
    <div class="path">Path: <span id="notfound-path"></span></div>
    <a href="/" class="home-btn">Back to the feed</a>
  </div>
  <script>
    document.getElementById('notfound-path').textContent = window.location.pathname;
  </script>
</body>
</html>
